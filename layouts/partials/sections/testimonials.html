<section class="section testimonials" style="padding: 3rem 0; border-top: 1px solid #1e3048; border-bottom: 1px solid #1e3048;">
  <div class="container">
    {{ with .content.featured }}
    <blockquote style="border-left: 2px solid #3d7ab5; padding: 1rem 1.5rem; margin: 0; color: #6a8aa5; font-style: normal;">
      <p style="font-size: 1rem; line-height: 1.75; margin-bottom: 0.75rem; color: #7a99b3;">"{{ .text }}"</p>
      <footer style="font-size: 0.85rem; color: #c5d5e4; font-weight: 500;">{{ .client }}</footer>
    </blockquote>
    {{ end }}
  </div>
</section>
